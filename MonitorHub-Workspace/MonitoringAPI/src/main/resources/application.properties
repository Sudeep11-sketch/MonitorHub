spring.application.name=MonitoringAPI

# 🌟 THE CRITICAL NETWORK FIX: Points to postgres-db instead of localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/monitoring_db}
spring.datasource.username=postgres
spring.datasource.password=sqldeep
server.port=8081

# Hibernate JPA parameters
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.hibernate.SQL=DEBUG

# Twilio Configuration Management Environment Profile
twilio.account.sid=${TWILIO_ACCOUNT_SID:AC00000000000000000000000000000000}
twilio.auth.token=${TWILIO_AUTH_TOKEN:00000000000000000000000000000000}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+10000000000}